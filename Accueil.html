  letter-spacing: 0.04em;
  margin-bottom: 24px;
  text-decoration:underline;
}
#nav {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px 28px;
  padding: 22px 20px;
  background-color: #f9f9f9;
  border-bottom: 1px solid #ddd;
}
#nav li a {
  text-decoration: none;
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #2e7d32;
  padding: 7px 18px;
  border: 2px solid #2e7d32;
  border-radius: 3px;
  transition: background 0.2s, color 0.2s;
}

#nav li a:hover {
  background-color: #2e7d32;
  color: #ffffff;
}               
#PhotosGalerie {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 24px;
}


.photo-thumb {
  position: relative;
  overflow: hidden;
  border-radius: 6px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  aspect-ratio: 4 / 3;        
  background: #e8e8e8;
  cursor: pointer;
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}


.photo-thumb::after {
  content: attr(data-caption);
  position: absolute;
  inset: 0;
  background: rgba(20, 60, 20, 0.82);
  color: #ffffff;
  font-family: 'Lato', sans-serif;
  font-size: 0.88rem;
  line-height: 1.5;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 18px;
  opacity: 0;
  transition: opacity 0.35s ease;
  border-radius: 6px;
}

.photo-thumb:hover::after {
  opacity: 1;
}

.photo-thumb:hover img {
  transform: scale(1.06);
}

footer{
  color: #2e7d32;
  background-color: #1a1a1a;
